name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm Trusted Publishing (OIDC) + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # Trusted Publishing requires npm >= 11.5.1.
      - run: npm install -g npm@latest

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - run: yarn install --frozen-lockfile

      - run: yarn lint

      - run: yarn test

      - run: yarn build

      # Set the published version to match the tag (no git commit; the npm
      # artifact carries the right version, main is left untouched).
      - name: Align package.json version to the tag
        run: npm pkg set version="$VERSION"

      - name: Publish to npm
        run: npm publish --provenance --access public
